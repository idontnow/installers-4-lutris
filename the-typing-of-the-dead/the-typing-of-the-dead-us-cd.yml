name: "The Typing of the Dead"
game_slug: the-typing-of-the-dead
version: US CD
slug: the-typing-of-the-dead-us-cd
runner: wine

script:
  game:
    exe: $GAMEDIR/drive_c/Games/TToTD/Todus.exe
    prefix: $GAMEDIR
  files:
    - boat_se_fix: https://github.com/idontnow/installers-4-lutris/raw/refs/heads/main/the-typing-of-the-dead/boat_fast2.wav
  installer:
  - task:
      description: Creating Wine prefix ...
      name: create_prefix
      prefix: $GAMEDIR
  - insert-disc:
      requires: SETUP.EXE
  - execute:
      command: printf "[InstallShield Silent]\nVersion=v6.00.000\nFile=Response File\n[File Transfer]\nOverwrittenReadOnly=NoToAll\n[{7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-DlgOrder]\nDlg0={7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdLicense-0\nCount=4\nDlg1={7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdAskDestPath-\nDlg2={7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdSelectFolder-0\nDlg3={7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdFinish-0\n[{7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdLicense-0]\nResult=1\n[{7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdAskDestPath-0]\nszDir=C:\Games\TToTD\n
Result=1\n[{7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdSelectFolder-0]\nszFolder=The Typing of The Dead US\nResult=1\n[Application]\nName=The Typing of The Dead US\nVersion=1.00.000\nCompany=SEGA\nLang=0009\n[{7CE0803C-CA6A-4D7A-8FB8-055EBB4AF141}-SdFinish-0]\nResult=1\nbOpt1=0\nbOpt2=0\n" > "$GAMEDIR/drive_c/install.iss"
      description: Generating silent install response file ...
  - task:
      args: /s /f1c:/install.iss
      description: Silent-installing to C:/Games/TToTD
      executable: $DISC/SETUP.EXE
      name: wineexec
      prefix: $GAMEDIR
  - merge:
      description: Replacing C:/Games/TToTD/sound/SE/STAGE3_SE/boat_fast2.wav with fixed sound file ...
      dst: $GAMEDIR/drive_c/Games/TToTD/sound/SE/STAGE3_SE/boat_fast2.wav
      src: boat_se_fix
