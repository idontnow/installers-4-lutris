name: "The Typing of the Dead"
game_slug: the-typing-of-the-dead
version: EU CD
slug: the-typing-of-the-dead-eu-cd
runner: wine

script:
  game:
    exe: $GAMEDIR/drive_c/Games/TToTD/Tod_e.exe
    prefix: $GAMEDIR
  files:
    - boat_se_fix: https://github.com/idontnow/installers-4-lutris/raw/refs/heads/main/the-typing-of-the-dead/boat_fast2.wav
  installer:
  - task:
      description: Creating Wine prefix ...
      name: create_prefix
      prefix: $GAMEDIR
  - insert-disc:
      requires: SETUP.EXE
  - task:
      description: Launching installer ...
      executable: $DISC/SETUP.EXE
      name: wineexec
      prefix: $GAMEDIR
  - move:
      description: Removing original boat_fast2.wav sound file ...
      dst: $CACHE/trash/
      src: $GAMEDIR/drive_c/Games/TToTD/sound/SE/STAGE3_SE/boat_fast2.wav
  - copy:
      description: Adding fixed boat_fast2.wav sound file ...
      dst: $GAMEDIR/drive_c/Games/TToTD/sound/SE/STAGE3_SE/boat_fast2.wav
      src: boat_se_fix
